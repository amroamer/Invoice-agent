worker_processes 1;

events {
    worker_connections 1024;
}

http {
    client_max_body_size 25m;
    sendfile on;
    gzip on;

    upstream backend {
        server backend:8000;
    }

    upstream frontend {
        server frontend:5173;
    }

    server {
        listen 80;
        server_name _;

        # Redirect bare root to the application base path.
        location = / {
            return 302 /InvoiceAgent/;
        }

        # API — strip /InvoiceAgent/api prefix before forwarding to FastAPI.
        location /InvoiceAgent/api/ {
            proxy_pass http://backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Frontend SPA + Vite dev assets under /InvoiceAgent/.
        location /InvoiceAgent/ {
            proxy_pass http://frontend/InvoiceAgent/;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Vite needs root-level /@vite, /@react-refresh, /@fs, /node_modules paths.
        location ~ ^/(@vite|@react-refresh|@fs|@id|node_modules)(/|$) {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # FastAPI docs (optional convenience).
        location /docs {
            proxy_pass http://backend/docs;
        }
        location /openapi.json {
            proxy_pass http://backend/openapi.json;
        }
    }
}
