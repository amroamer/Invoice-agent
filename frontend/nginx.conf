server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Strip the /InvoiceAgent prefix before looking up files on disk.
    # The Vite build outputs assets at /InvoiceAgent/assets/... (because base
    # is set to "/InvoiceAgent/" in vite.config.ts), but those files actually
    # live at /usr/share/nginx/html/assets/... — so we alias the prefix away.
    location /InvoiceAgent/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /index.html;
    }

    # Also handle bare /InvoiceAgent (no trailing slash) — redirect to slash version.
    location = /InvoiceAgent {
        return 301 /InvoiceAgent/;
    }

    # Anything else (e.g. health probes from the outer nginx, root requests)
    # falls through to the SPA root.
    location / {
        try_files $uri $uri/ /index.html;
    }
}